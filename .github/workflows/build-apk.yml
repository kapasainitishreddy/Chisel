name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, claude/app-screenshots-kokgjn]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies
        working-directory: chisel-android
        run: npm ci || npm install --no-audit --no-fund

      - name: Sync web assets into Android project
        working-directory: chisel-android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: chisel-android/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chisel-debug-apk
          path: chisel-android/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to a release for easy phone download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -oP 'versionName "\K[^"]+' chisel-android/android/app/build.gradle)
          TAG="apk-v${VERSION}"
          cp chisel-android/android/app/build/outputs/apk/debug/app-debug.apk "chisel-v${VERSION}-debug.apk"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --prerelease --title "Chisel v${VERSION} (debug APK)" \
              --notes "Debug APK built by CI. Download on your phone, allow install-from-unknown-sources, and open it."
          gh release upload "$TAG" "chisel-v${VERSION}-debug.apk" --clobber
