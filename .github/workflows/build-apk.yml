name: Build Android APK

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'chisel-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Ensure Android SDK platform & build-tools
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install JS dependencies
        working-directory: chisel-android
        run: npm install

      - name: Sync Capacitor (copy www assets + native plugins into android/)
        working-directory: chisel-android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: chisel-android/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chisel-debug-apk
          path: chisel-android/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
